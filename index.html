<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شركة سولر للطاقة الشمسية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #22c55e; margin-bottom: 10px; }
        .subtitle { color: #38bdf8; margin-bottom: 30px; font-weight: bold; }
        img { max-width: 90%; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        .card {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 20px;
            margin: 30px auto;
            max-width: 400px;
            border: 1px solid #334155;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:hover { background-color: #128C7E; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>سولر للطاقة الشمسية</h1>
    <p class="subtitle">مستقبلك مشرق.. طاقة نظيفة ومستدامة</p>

    <img src="mmm.jpg" alt="منظومة طاقة شمسية">

    <div class="card">
        <h3>نظام الأقساط المريحة</h3>
        <p>نوفر لكم خطط سداد مرنة جداً تتناسب مع دخلكم، لتبدأ رحلتك بدون ضغوط مالية.</p>
    </div>

    <a href="https://wa.me/249910859147?text=مرحباً، أود الاستفسار عن أسعار المنظومات الشمسية" 
       class="btn" target="_blank">
        تواصل مع المشرف العام
    </a>

</body>
</html>
